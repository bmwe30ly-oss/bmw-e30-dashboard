name: BMW APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: sudo apt-get update -qq && sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libffi-dev libssl-dev build-essential
      - run: pip install buildozer==1.5.0 cython==0.29.36
      - run: yes | buildozer android debug
      - uses: actions/upload-artifact@v3
        with:
          name: BMW-APK
          path: bin/*.apk
