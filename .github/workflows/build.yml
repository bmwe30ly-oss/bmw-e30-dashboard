name: Build BMW E30 APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install system packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libffi-dev libssl-dev build-essential

      - name: Install buildozer
        run: |
          pip install buildozer==1.5.0 cython==0.29.36

      - name: Build APK
        run: |
          yes | buildozer android debug

      - uses: actions/upload-artifact@v3
        with:
          name: BMW-E30-APK
          path: bin/*.apk
